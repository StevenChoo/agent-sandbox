# ── Colors ────────────────────────────────────────────────────────────────────
# Full 256-color + true-color support for Claude Code's UI
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Escape time ───────────────────────────────────────────────────────────────
# Reduce from the 500ms default so Claude Code's TUI reacts instantly to Escape
set -s escape-time 10

# ── Scrollback ────────────────────────────────────────────────────────────────
set -g history-limit 50000

# ── Mouse ─────────────────────────────────────────────────────────────────────
# Click to focus pane, scroll to browse output, drag to resize panes
set -g mouse on

# ── Window numbering ──────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Activity ──────────────────────────────────────────────────────────────────
# Flash the status bar when a background window produces output
setw -g monitor-activity on
set -g visual-activity off
